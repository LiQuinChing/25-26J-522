worker_processes auto;

events { worker_connections 1024; }

http {
    sendfile on;

    upstream frontend { server frontend:80; }
    upstream node_server { server node_server:5000; }
    upstream cad_models { server cad_models:8000; } 
    upstream arr_models { server arr_models:8001; }
    upstream svt_api { server svt_api:8002; }
    upstream mi_app { server svt_app:8003; } 
    upstream ecg_digitizer { server ecg_digitizer:8501; }

    server {
        listen 80;

        # 1. React Frontend
        location / {
            proxy_pass http://frontend;
        }

        # 2. Node.js Backend 
        location /api/ {
            proxy_pass http://node_server/api/;
        }

        # 3. CAD Models (Strips /cad/ so backend sees /login, /signup, etc)
        location /cad/ {
            proxy_pass http://cad_models/;
        }

        # 4. SVT Predict API
        location /svt/ {
            proxy_pass http://svt_api/;
        }

        # 5. Myocardial Infarction App
        location /mi/ {
            proxy_pass http://mi_app/;
        }

        # 6. Streamlit Digitizer App (Requires specific Websocket headers)
        location /digitizer/ {
            proxy_pass http://ecg_digitizer/;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}